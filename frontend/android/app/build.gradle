apply plugin: 'com.android.application'

import java.util.Properties

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def resolveOptionalConfig = { envKey, propertyKey ->
    def envValue = System.getenv(envKey)
    if (envValue != null && envValue.toString().trim()) {
        return envValue.toString().trim()
    }

    def propertyValue = keystoreProperties.getProperty(propertyKey)
    if (propertyValue != null && propertyValue.toString().trim()) {
        return propertyValue.toString().trim()
    }

    return null
}

def resolveVersionCodeValue = {
    def rawValue = (System.getenv('NOTIVE_VERSION_CODE') ?: project.findProperty('NOTIVE_VERSION_CODE') ?: '1').toString().trim()
    try {
        return Integer.parseInt(rawValue)
    } catch (Exception ignored) {
        return 1
    }
}

def resolveVersionNameValue = {
    def rawValue = (System.getenv('NOTIVE_VERSION_NAME') ?: project.findProperty('NOTIVE_VERSION_NAME') ?: '1.0.0').toString().trim()
    return rawValue ?: '1.0.0'
}

def releaseStoreFilePath = resolveOptionalConfig('PLAY_UPLOAD_STORE_FILE', 'storeFile')
def releaseStoreFile = releaseStoreFilePath ? rootProject.file(releaseStoreFilePath) : null
def releaseStorePassword = resolveOptionalConfig('PLAY_UPLOAD_STORE_PASSWORD', 'storePassword')
def releaseKeyAlias = resolveOptionalConfig('PLAY_UPLOAD_KEY_ALIAS', 'keyAlias')
def releaseKeyPassword = resolveOptionalConfig('PLAY_UPLOAD_KEY_PASSWORD', 'keyPassword')
def hasReleaseSigning = releaseStoreFile != null && releaseStoreFile.exists() && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace "com.notive.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.notive.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolveVersionCodeValue()
        versionName resolveVersionNameValue()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.configureEach { task ->
    if (task.name == 'bundleRelease' || task.name == 'assembleRelease') {
        task.doFirst {
            if (!hasReleaseSigning) {
                throw new GradleException('Release signing is not configured. Add frontend/android/key.properties or set PLAY_UPLOAD_STORE_FILE, PLAY_UPLOAD_STORE_PASSWORD, PLAY_UPLOAD_KEY_ALIAS, and PLAY_UPLOAD_KEY_PASSWORD.')
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    // Firebase (Push Notifications)
    // Import the Firebase BoM (Bill of Materials) for version management
    implementation platform('com.google.firebase:firebase-bom:34.11.0')
    
    // Firebase Cloud Messaging (for push notifications)
    implementation 'com.google.firebase:firebase-messaging'
    
    // Firebase Analytics (recommended for Firebase integration)
    implementation 'com.google.firebase:firebase-analytics'
    
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
