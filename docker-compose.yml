
services:
  nlp:
    build:
      context: ./backend/nlp_service
    ports:
      - "8001:8001"

  postgres:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notive_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  similarity-service:
    build:
      context: ./similarity-service
      dockerfile: Dockerfile
    environment:
      MODEL_NAME: BAAI/bge-small-en-v1.5
      PAD_TO_DIMS: 1536
      RERANKER_MODEL_NAME: cross-encoder/ms-marco-MiniLM-L6-v2
    volumes:
      - similarity_cache:/app/.cache
    ports:
      - "8002:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  similarity_cache:
