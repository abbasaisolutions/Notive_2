
services:
  nlp:
    build:
      context: ./backend/nlp_service
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: ankane/pgvector:v0.8.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notive_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d notive_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  similarity-service:
    build:
      context: ./similarity-service
      dockerfile: Dockerfile
      args:
        INSTALL_ONNX: ${SIMILARITY_INSTALL_ONNX:-1}
    environment:
      MODEL_NAME: ${SIMILARITY_MODEL_NAME:-BAAI/bge-base-en-v1.5}
      PAD_TO_DIMS: ${SIMILARITY_PAD_TO_DIMS:-0}
      RERANKER_MODEL_NAME: ${SIMILARITY_RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L6-v2}
      EMBEDDING_BACKEND: ${SIMILARITY_EMBEDDING_BACKEND:-onnx}
      RERANKER_BACKEND: ${SIMILARITY_RERANKER_BACKEND:-torch}
      EMBED_BATCH_SIZE: ${SIMILARITY_EMBED_BATCH_SIZE:-32}
      RERANK_BATCH_SIZE: ${SIMILARITY_RERANK_BATCH_SIZE:-16}
      TORCH_NUM_THREADS: ${SIMILARITY_TORCH_NUM_THREADS:-0}
      TORCH_NUM_INTEROP_THREADS: ${SIMILARITY_TORCH_NUM_INTEROP_THREADS:-0}
    volumes:
      - similarity_cache:/app/.cache
    ports:
      - "8002:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  stt-service:
    build:
      context: ./stt-service
      dockerfile: Dockerfile
    environment:
      STT_MODEL_SIZE: ${STT_MODEL_SIZE:-large-v3-turbo}
      STT_DEVICE: ${STT_DEVICE:-cpu}
      STT_COMPUTE_TYPE: ${STT_COMPUTE_TYPE:-int8}
      STT_BEAM_SIZE: ${STT_BEAM_SIZE:-5}
      STT_BEST_OF: ${STT_BEST_OF:-5}
      STT_VAD_FILTER: ${STT_VAD_FILTER:-true}
    volumes:
      - stt_cache:/root/.cache
    ports:
      - "8003:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  similarity_cache:
  stt_cache:
