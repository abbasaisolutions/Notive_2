name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: API path audit
        run: npm run api:audit

      - name: UI audit
        run: CI_UI_STRICT=1 npm run ui:audit

      - name: Link audit
        run: npm run link:audit

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://notive:notive@localhost:5432/notive_ci?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      CLIENT_URL: http://localhost:3000
      API_URL: http://localhost:8000/api/v1
      CORS_ORIGINS: http://localhost:3000
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Use backend npm version
        run: npm install -g npm@10.9.3

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test
