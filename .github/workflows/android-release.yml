name: Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-release:
    runs-on: ubuntu-latest
    env:
      HAS_GOOGLE_PLAY_PUBLISHING: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_NATIVE_API_URL: ${{ vars.NEXT_PUBLIC_NATIVE_API_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${{ vars.NEXT_PUBLIC_SUPPORT_EMAIL }}
      PLAY_UPLOAD_STORE_PASSWORD: ${{ secrets.PLAY_UPLOAD_STORE_PASSWORD }}
      PLAY_UPLOAD_KEY_ALIAS: ${{ secrets.PLAY_UPLOAD_KEY_ALIAS }}
      PLAY_UPLOAD_KEY_PASSWORD: ${{ secrets.PLAY_UPLOAD_KEY_PASSWORD }}
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: npm ci

      - name: Restore Android signing keystore
        env:
          PLAY_UPLOAD_KEYSTORE_BASE64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$PLAY_UPLOAD_KEYSTORE_BASE64" ]]; then
            echo "Missing required secret PLAY_UPLOAD_KEYSTORE_BASE64" >&2
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/notive-upload-key.jks"
          echo "$PLAY_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "PLAY_UPLOAD_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Resolve Android CI version
        id: version
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_VERSION_CODE_OFFSET: "10000"
        run: node scripts/resolve-android-ci-version.mjs --github-output

      - name: Build signed Android release bundle
        env:
          NOTIVE_VERSION_CODE: ${{ steps.version.outputs.versionCode }}
          NOTIVE_VERSION_NAME: ${{ steps.version.outputs.versionName }}
        run: |
          npm run android:ready
          npm run android:prepare
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: notive-android-${{ steps.version.outputs.versionName }}-${{ github.sha }}
          path: |
            frontend/android/app/build/outputs/bundle/release/app-release.aab
            frontend/android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn

      - name: Upload to Google Play internal track
        if: ${{ env.HAS_GOOGLE_PLAY_PUBLISHING == 'true' }}
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.notive.app
          releaseFiles: frontend/android/app/build/outputs/bundle/release/app-release.aab
          mappingFile: frontend/android/app/build/outputs/mapping/release/mapping.txt
          releaseName: Notive ${{ steps.version.outputs.versionName }} (${{ steps.version.outputs.versionCode }})
          track: internal
          status: completed
